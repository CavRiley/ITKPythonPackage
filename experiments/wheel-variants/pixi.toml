[workspace]
name = "itk-wheel-variants-experiment"
version = "0.1.0"
description = "Sandbox for evaluating PEP 817 wheel variants against ITKPythonPackage's wheels"
authors = ["Cavan Riley <cavan-riley@uiowa.edu>"]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.11,<3.13"
cmake = ">=3.26,<4"
ninja = ">=1.11"
pip = "*"
# variantlib pins packaging>=25.0,<26.0; pin in the conda layer so the
# PyPI solve can satisfy that bound.
packaging = ">=25.0,<26.0"
# Inspection / validation is done via inspect_wheel.py and
# validate_variant_wheel.py (Python stdlib zipfile + json), so no shell
# tools like `unzip` or `jq` are required (and they aren't on conda-forge
# for win-64 anyway).

[pypi-dependencies]
# Build backend with PEP 817 variants support. wheelnext/scikit-build-core@main
# is stale (no variants); use the henryiii fork branch that backs PR #1284.
scikit-build-core = { git = "https://github.com/henryiii/scikit-build-core.git", branch = "henryiii/feat/variants" }

# Reference variantlib implementation (variant.json synthesis + parsing).
# Used both at build time (the fork auto-injects variantlib as a build req
# when variants are active) and at validation time (mock/validate_variant_wheel.py).
variantlib = { git = "https://github.com/wheelnext/variantlib.git" }

# Pilot project's only real build dep.
pybind11 = "*"

# Standard build frontend (driven by build_pilot.sh).
build = "*"

[tasks]
build-pilot = "bash pilot/build_pilot.sh"
inspect-pilot = "python pilot/inspect_wheel.py pilot/dist"
# mock/ is retained as a reference (proves the post-process path also works)
# but the production approach is now to emit variant wheels natively from the
# real ITK build via the new variant-build pixi feature in the root pixi.toml.
# See docs/findings.md for the design pivot.
validate-pilot = "python mock/validate_variant_wheel.py pilot/dist"
