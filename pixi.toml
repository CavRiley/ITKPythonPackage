[workspace]
authors = [
  "Insight Software Consortium <>",
  "Matt McCormick <matt@fideus.io>",
  "Jean-Christophe Fillion-Robin <jchris.fillionr@kitware.com>",
  "Tom Birdsong <tom.birdsong@kitware.com>",
  "Hans J. Johnson <hans-johnson@uiowa.edu>",
  "Dženan Zukić <dzenan.zukic@kitware.com>",
  "Simon Rit <simon.rit@creatis.insa-lyon.fr>",
  "Francois Budin <francois.budin@kitware.com>",
  "LucasGandel <lucas.gandel@gmail.com>",
  "Davis Marc Vigneault <davis.vigneault@gmail.com>",
  "Jon Haitz Legarreta Gorroño <jon.haitz.legarreta@gmail.com>",
  "Lee Newberg <lee.newberg@kitware.com>",
  "Cavan Riley <cavan-riley@uiowa.edu>",
]

name = "ITKPythonPackage"
version = "0.1.0"
# `file:///Users/cavriley/local-channel` hosts a developer-built `libitk` /
# `libitk-devel` / `libitk-wrapping` for osx-arm64 used by the
# `macosx-conda-py312` environment.  conda-forge remains the primary channel.
channels = ["file:///Users/cavriley/local-channel", "conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

########################################
# Common features used by all envs
########################################

# Build tooling shared by all platforms
[feature.build-dev-tools]
[feature.build-dev-tools.dependencies]
cmake = ">=3.26,<4"
doxygen = "<2"
ninja = ">=1.11.1,<2"
pkginfo = ">=1.12.1.2,<2"

# Python packaging/build support shared by all platforms
[feature.python-dev-pkgs]
[feature.python-dev-pkgs.dependencies]
numpy = ">=1.26"
packaging = ">=25.0,<26"
pathspec = "*"
pyproject-metadata = "*"
scikit-build-core = ">=0.11.6,<0.12.0"
setuptools_scm = ">=9.2.0"
setuptools = ">=61"
tomli = "*"
pip = "*"

[feature.python-dev-pkgs.pypi-dependencies]
build = "*"

########################################
# Manylinux-specific features
########################################

# Shared dependencies for all manylinux wheel builds
# (might be helpful for including newer manylinux versions later)
[feature.manylinux-common-build]
platforms = ["linux-64", "linux-aarch64"]

[feature.manylinux-common-build.dependencies]
auditwheel = "*"
patchelf = "*"   # Needed for auditwheel
wheel = "*"

[feature.manylinux-common-build.pypi-dependencies]
build = "*"

[feature.linux-build]
platforms = ["linux-64", "linux-aarch64"]

[feature.linux-build.dependencies]
cxx-compiler = "==1.11.0"
c-compiler = "==1.11.0"
libhwloc = "*"            # Needed for tbb
auditwheel = "*"
patchelf = "*"            # Needed for auditwheel
wheel = "*"

[feature.manylinux228-build]
platforms = ["linux-64", "linux-aarch64"]

[feature.manylinux228-build.system-requirements]
linux = "5.4"
libc = { family = "glibc", version = "2.28" }

[feature.linux-build.activation.env]
PYTHONNOUSERSITE = "1" # Exclude system .local site packages

########################################
# macOS-specific feature
########################################

[feature.macosx-build]
platforms = ["osx-64", "osx-arm64"]
system-requirements = { macos = "10.7" }

# delocate is a Python tool; cxx-compiler is the macOS toolchain meta-package
[feature.macosx-build.pypi-dependencies]
delocate = "*"

[feature.macosx-build.dependencies]
cxx-compiler = "==1.10.0" # XCode 16.0 before castxml required updates
c-compiler = "==1.10.0"   # XCode 16.0 before castxml required updates
#libhwloc = "*" # Needed for tbb

[feature.windows-build]
platforms = ["win-64"]

[feature.windows-build.dependencies]
git = "*"                 # Git is not always available in PowerShell by default
cxx-compiler = "==1.11.0" # MSVC 2022
c-compiler = "==1.11.0"   # MSVC 2022

[feature.windows-build.pypi-dependencies]
delvewheel = "*"
# windows = "*"

[feature.py310]
[feature.py310.dependencies]
python = ">=3.10,<3.11"

[feature.py311]
[feature.py311.dependencies]
python = ">=3.11,<3.12"

[feature.py312]
[feature.py312.dependencies]
python = ">=3.12,<3.13"

#[feature.py313]
#[feature.py313.dependencies]
#python = ">=3.13,<3.14"
#
#[feature.py314]
#[feature.py314.dependencies]
#python = ">=3.14,<3.15"

########################################
# Conda-supplied ITK cache (libitk-wrapping)
########################################
# When this feature is layered into an environment, the build system detects
# `$CONDA_PREFIX/lib/cmake/ITK-*/ITKConfig.cmake` via _detect_conda_itk() and
# skips the superbuild + ITK C++ wrapping steps entirely.  Currently wired up
# only for osx-arm64; the packages are produced by the rattler-build recipe
# at `packages/libitk-wrapping/`.
[feature.conda-itk-cache]
# osx-arm64 is the actively-tested platform; win-64 is wired up but
# requires a Windows-built libitk-wrapping conda package to be present
# in a channel.  Until that exists, the `windows-conda-py312` env will
# simply fail to solve, which is the expected friendly failure mode.
platforms = ["osx-arm64", "win-64"]
# `libitk` 6.0.0 in ~/local-channel was built against macOS 11.0+
# (`__osx >=11.0`), so the env that consumes it must declare a
# matching system requirement.  The looser 10.7 floor from
# `macosx-build` is fine for the from-source path; the conda-cache
# path bumps it.  Windows has no equivalent constraint here.
system-requirements = { macos = "11.0" }

[feature.conda-itk-cache.dependencies]
# Accept any ITK series from 5.4 onward.  The wheel-build Python code
# globs ``lib/cmake/ITK-*`` for the cmake config directory and never
# refers to a specific MAJOR.MINOR.  An older local-channel that only
# carries ITK 5.4.x will still resolve; a newer one with ITK 6.x or
# 7.x will pick that up automatically.
libitk = ">=5.4,<8"
libitk-devel = ">=5.4,<8"
# Both runtime and -devel of libitk-wrapping are needed: the runtime
# package ships the Python ``.so`` modules and ITKConfig.cmake;
# the -devel package ships the CMake targets and headers that the
# wheel-time ``find_package(ITK REQUIRED)`` consumes.
libitk-wrapping = ">=5.4,<8"
libitk-wrapping-devel = ">=5.4,<8"

########################################
# Publishing feature (no compilers needed)
########################################
[feature.publish]
[feature.publish.dependencies]
python = ">=3.10"
gh = "*"
zstd = "*"

[feature.publish.pypi-dependencies]
twine = ">=6.0"


########################################
# Environments: compose features per target
########################################

[environments]
publish = ["publish"]
linux-py310 = ["py310", "linux-build", "build-dev-tools", "python-dev-pkgs"]
linux-py311 = ["py311", "linux-build", "build-dev-tools", "python-dev-pkgs"]

# Manylinux wheel-build env (docker manylinux228 images, CI, etc.)
manylinux228-py310 = [
  "py310",
  "manylinux-common-build",
  "manylinux228-build",
  "build-dev-tools",
  "python-dev-pkgs",
]
manylinux228-py311 = [
  "py311",
  "manylinux-common-build",
  "manylinux228-build",
  "build-dev-tools",
  "python-dev-pkgs",
]


# macOS build env (both Intel and Apple Silicon)
macosx-py310 = ["py310", "build-dev-tools", "python-dev-pkgs", "macosx-build"]
macosx-py311 = ["py311", "build-dev-tools", "python-dev-pkgs", "macosx-build"]

# macOS arm64 env that consumes the libitk-wrapping conda cache.
# Pulls libitk/libitk-devel/libitk-wrapping from the local-channel listed above.
macosx-conda-py312 = [
  "py312",
  "build-dev-tools",
  "python-dev-pkgs",
  "macosx-build",
  "conda-itk-cache",
]

# Windows env that consumes the libitk-wrapping conda cache is intentionally
# NOT defined here.  pixi validates every env in the workspace on every
# operation, and an env with unsatisfiable dependencies breaks the whole
# workspace — including unrelated `pixi run -e macosx-conda-py312`.  Until
# a win-64 build of libitk-wrapping is published to a reachable channel,
# defining the env would poison the workspace for everyone.
#
# To enable Windows conda-cache builds once such a package exists, add:
#
#   windows-conda-py312 = [
#     "py312",
#     "build-dev-tools",
#     "python-dev-pkgs",
#     "windows-build",
#     "conda-itk-cache",
#   ]
#
# The IPP-side support is already wired up in
# scripts/windows_build_python_instance.py and the cmake_install.cmake.in
# shim — both handle .pyd files and .libs/ bundle forwarding.

# Windows build env
windows-py310 = ["py310", "build-dev-tools", "python-dev-pkgs", "windows-build"]
windows-py311 = ["py311", "build-dev-tools", "python-dev-pkgs", "windows-build"]

[dependencies]
# pixi-pycharm and conda are only needed to support development in pycharm
# https://pixi.prefix.dev/v0.21.1/ide_integration/pycharm/#how-to-use
pixi-pycharm = ">=0.0.10,<0.0.11"
conda = "*"
taplo = ">=0.8.1,<0.11"
pre-commit = "*"

[tasks]
taplo = "fmt pixi.toml"

[tasks.build-itk-wheels]
cmd = ["python", "scripts/build_wheels.py"]

[tasks.pre-commit-install]
cmd = "pre-commit install -f -t pre-commit -t prepare-commit-msg -t commit-msg --hook-type commit-msg --install-hooks"

[tasks.pre-commit-run]
cmd = "pre-commit run --all-files"

[tasks.publish-wheels]
cmd = ["python", "scripts/publish_wheels.py"]
description = "Upload built wheels to PyPI (or TestPyPI with --test)"

[tasks.publish-tarball-cache]
cmd = ["python", "scripts/publish_tarball_cache.py"]
description = "Upload .tar.zst/.zip build caches to GitHub Releases"
