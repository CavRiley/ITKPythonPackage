[workspace]
authors = [
  "Insight Software Consortium <>",
  "Matt McCormick <matt@fideus.io>",
  "Jean-Christophe Fillion-Robin <jchris.fillionr@kitware.com>",
  "Tom Birdsong <tom.birdsong@kitware.com>",
  "Hans J. Johnson <hans-johnson@uiowa.edu>",
  "Dženan Zukić <dzenan.zukic@kitware.com>",
  "Simon Rit <simon.rit@creatis.insa-lyon.fr>",
  "Francois Budin <francois.budin@kitware.com>",
  "LucasGandel <lucas.gandel@gmail.com>",
  "Davis Marc Vigneault <davis.vigneault@gmail.com>",
  "Jon Haitz Legarreta Gorroño <jon.haitz.legarreta@gmail.com>",
  "Lee Newberg <lee.newberg@kitware.com>",
  "Cavan Riley <cavan-riley@uiowa.edu>",
]

name = "ITKPythonPackage"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

########################################
# Common features used by all envs
########################################

# Build tooling shared by all platforms
[feature.build-dev-tools]
[feature.build-dev-tools.dependencies]
cmake = ">=3.26,<4"
doxygen = "<2"
ninja = ">=1.11.1,<2"
pkginfo = ">=1.12.1.2,<2"

# Python packaging/build support shared by all platforms
[feature.python-dev-pkgs]
[feature.python-dev-pkgs.dependencies]
numpy = ">=1.26"
packaging = ">=25.0,<26"
pathspec = "*"
pyproject-metadata = "*"
scikit-build-core = ">=0.11.6,<0.12.0"
setuptools_scm = ">=9.2.0"
setuptools = ">=61"
tomli = "*"
pip = "*"

[feature.python-dev-pkgs.pypi-dependencies]
build = "*"

########################################
# Manylinux-specific features
########################################

# Shared dependencies for all manylinux wheel builds
# (might be helpful for including newer manylinux versions later)
[feature.manylinux-common-build]
platforms = ["linux-64", "linux-aarch64"]

[feature.manylinux-common-build.dependencies]
auditwheel = "*"
patchelf = "*"   # Needed for auditwheel
wheel = "*"

[feature.manylinux-common-build.pypi-dependencies]
build = "*"

[feature.linux-build]
platforms = ["linux-64", "linux-aarch64"]

[feature.linux-build.dependencies]
cxx-compiler = "==1.11.0"
c-compiler = "==1.11.0"
libhwloc = "*"            # Needed for tbb
auditwheel = "*"
patchelf = "*"            # Needed for auditwheel
wheel = "*"

[feature.manylinux228-build]
platforms = ["linux-64", "linux-aarch64"]

[feature.manylinux228-build.system-requirements]
linux = "5.4"
libc = { family = "glibc", version = "2.28" }

[feature.linux-build.activation.env]
PYTHONNOUSERSITE = "1" # Exclude system .local site packages

########################################
# macOS-specific feature
########################################

[feature.macosx-build]
platforms = ["osx-64", "osx-arm64"]
system-requirements = { macos = "10.7" }

# delocate is a Python tool; cxx-compiler is the macOS toolchain meta-package
[feature.macosx-build.pypi-dependencies]
delocate = "*"

[feature.macosx-build.dependencies]
cxx-compiler = "==1.10.0" # XCode 16.0 before castxml required updates
c-compiler = "==1.10.0"   # XCode 16.0 before castxml required updates
#libhwloc = "*" # Needed for tbb

[feature.windows-build]
platforms = ["win-64"]

[feature.windows-build.dependencies]
git = "*"                 # Git is not always available in PowerShell by default
cxx-compiler = "==1.11.0" # MSVC 2022
c-compiler = "==1.11.0"   # MSVC 2022

[feature.windows-build.pypi-dependencies]
delvewheel = "*"
# windows = "*"

[feature.py310]
[feature.py310.dependencies]
python = ">=3.10,<3.11"

[feature.py311]
[feature.py311.dependencies]
python = ">=3.11,<3.12"

#[feature.py312]
#[feature.py312.dependencies]
#python = ">=3.12,<3.13"
#
#[feature.py313]
#[feature.py313.dependencies]
#python = ">=3.13,<3.14"
#
#[feature.py314]
#[feature.py314.dependencies]
#python = ">=3.14,<3.15"

########################################
# PEP 817 wheel variants experiment (opt-in)
########################################
# Activates the variants-enabled fork of scikit-build-core (PR
# scikit-build/scikit-build-core#1284) plus wheelnext/variantlib so that
# `python -m build` emits per-variant wheels when the variant config-settings
# are set. Drive via the build_wheels.py CLI flags --wheel-variant /
# --wheel-variant-label / --null-variant or their env-var equivalents.
#
# Activation:
#   pixi run -e variant-macosx-py311 build-itk-wheels \
#       --wheel-variant 'itk::threading::tbb' --wheel-variant-label tbbon
#
# Status: opt-in only. The default production envs (manylinux228-py311,
# macosx-py311, windows-py311, ...) are unaffected — they continue to use the
# stock scikit-build-core pin from python-dev-pkgs and never see variant
# config-settings. See experiments/wheel-variants/docs/findings.md for design
# notes and the upstream-PR risk inventory.
[feature.variant-build]

[feature.variant-build.pypi-dependencies]
# scikit-build-core fork backing PR #1284 (filename label suffix +
# variant.json sidecar). wheelnext/scikit-build-core@main is stale and its
# variant-hash-build-tag branch encodes a different design — fall back to
# henryiii's branch which tracks the live PR.
scikit-build-core = { git = "https://github.com/henryiii/scikit-build-core.git", branch = "henryiii/feat/variants" }
# Reference variantlib implementation; the fork auto-injects this as a build
# requirement when variants are active.
variantlib = { git = "https://github.com/wheelnext/variantlib.git" }
# Upstream PEP 817 provider plugin for the x86_64 microarchitecture namespace
# (feature `level` ∈ v1..v4 + extensions like avx2/aes/sse4_1). Available
# under entry-point group `variant_plugins`. Required at build time so the
# fork can validate properties like `x86_64::level::v3`, and at host-query
# time for `variantlib plugins get-configs -s -n x86_64`.
provider-variant-x86-64 = { git = "https://github.com/wheelnext/provider-variant-x86-64.git" }

# Mirror of python-dev-pkgs WITHOUT the scikit-build-core conda pin
# (>=0.11.6,<0.12.0). Pixi feature merging is intersection, so the stock
# pin would prevent the variants fork (0.12.3.dev*) from resolving alongside.
# Variant envs use this instead of python-dev-pkgs.
[feature.variant-python-dev-pkgs]
[feature.variant-python-dev-pkgs.dependencies]
numpy = ">=1.26"
packaging = ">=25.0,<26"
pathspec = "*"
pyproject-metadata = "*"
# scikit-build-core deliberately omitted — supplied by feature.variant-build
# from the henryiii git fork.
setuptools_scm = ">=9.2.0"
setuptools = ">=61"
tomli = "*"
pip = "*"

[feature.variant-python-dev-pkgs.pypi-dependencies]
build = "*"

########################################
# Publishing feature (no compilers needed)
########################################
[feature.publish]
[feature.publish.dependencies]
python = ">=3.10"
gh = "*"
zstd = "*"

[feature.publish.pypi-dependencies]
twine = ">=6.0"


########################################
# Environments: compose features per target
########################################

[environments]
publish = ["publish"]
linux-py310 = ["py310", "linux-build", "build-dev-tools", "python-dev-pkgs"]
linux-py311 = ["py311", "linux-build", "build-dev-tools", "python-dev-pkgs"]

# Manylinux wheel-build env (docker manylinux228 images, CI, etc.)
manylinux228-py310 = [
  "py310",
  "manylinux-common-build",
  "manylinux228-build",
  "build-dev-tools",
  "python-dev-pkgs",
]
manylinux228-py311 = [
  "py311",
  "manylinux-common-build",
  "manylinux228-build",
  "build-dev-tools",
  "python-dev-pkgs",
]


# macOS build env (both Intel and Apple Silicon)
macosx-py310 = ["py310", "build-dev-tools", "python-dev-pkgs", "macosx-build"]
macosx-py311 = ["py311", "build-dev-tools", "python-dev-pkgs", "macosx-build"]

# Windows build env
windows-py310 = ["py310", "build-dev-tools", "python-dev-pkgs", "windows-build"]
windows-py311 = ["py311", "build-dev-tools", "python-dev-pkgs", "windows-build"]

# Wheel variants envs (parallel to the production envs, but activate the
# variants-enabled scikit-build-core fork via [feature.variant-build]).
# Only py311 for now — variants are opt-in and only one Python ABI is needed
# to validate the format. Add more pyXYZ pairs as the feature stabilizes.
variant-macosx-py311 = [
  "py311",
  "build-dev-tools",
  "variant-python-dev-pkgs",
  "macosx-build",
  "variant-build",
]
variant-linux-py311 = [
  "py311",
  "linux-build",
  "build-dev-tools",
  "variant-python-dev-pkgs",
  "variant-build",
]
variant-manylinux228-py311 = [
  "py311",
  "manylinux-common-build",
  "manylinux228-build",
  "build-dev-tools",
  "variant-python-dev-pkgs",
  "variant-build",
]
variant-windows-py311 = [
  "py311",
  "build-dev-tools",
  "variant-python-dev-pkgs",
  "windows-build",
  "variant-build",
]

[dependencies]
# pixi-pycharm and conda are only needed to support development in pycharm
# https://pixi.prefix.dev/v0.21.1/ide_integration/pycharm/#how-to-use
pixi-pycharm = ">=0.0.10,<0.0.11"
conda = "*"
taplo = ">=0.8.1,<0.11"
pre-commit = "*"

[tasks]
taplo = "fmt pixi.toml"

[tasks.build-itk-wheels]
cmd = ["python", "scripts/build_wheels.py"]

[tasks.pre-commit-install]
cmd = "pre-commit install -f -t pre-commit -t prepare-commit-msg -t commit-msg --hook-type commit-msg --install-hooks"

[tasks.pre-commit-run]
cmd = "pre-commit run --all-files"

[tasks.publish-wheels]
cmd = ["python", "scripts/publish_wheels.py"]
description = "Upload built wheels to PyPI (or TestPyPI with --test)"

[tasks.publish-tarball-cache]
cmd = ["python", "scripts/publish_tarball_cache.py"]
description = "Upload .tar.zst/.zip build caches to GitHub Releases"
